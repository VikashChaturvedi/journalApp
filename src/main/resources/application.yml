spring:
  application:
    name: journalApp
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/journaldb}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8080}

weather:
  apikey: ${WEATHER_API_KEY:}

# Redis is disabled by default. Set REDIS_ENABLED=true (and run a Redis instance)
# along with removing the spring.autoconfigure.exclude entries above to re-enable it.
redis:
  enabled: ${REDIS_ENABLED:false}

logging:
  level:
    root: INFO
    net.engineeringdigest.journalApp: DEBUG
